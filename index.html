<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Developer Editor</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/10.0.1/jsoneditor.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toolbar">
    <div class="btn-group">
      <button id="btn-new">New</button>
      <button id="btn-open">Open</button>
      <button id="btn-save">Save</button>
      <button id="btn-format">Format Code</button>
    </div>
    <div class="file-info">
      <input type="text" id="file-name" placeholder="Filename (Blank = timestamp save)" />
      <span id="save-status"></span>
    </div>
  </div>

  <div id="tabs-container" class="tabs-container">
    <div class="tabs-list" id="tabs-list"></div>
    <button id="btn-add-tab" class="tab-add-btn">+</button>
  </div>
  
  <div class="main-content">
    <div id="editor-container" class="panel"></div>
    <div id="tree-container" class="panel hidden">
      <div class="json-tools">
        <label><input type="radio" name="path-style" value="dot" checked> Dot Notation</label>
        <label><input type="radio" name="path-style" value="bracket"> Bracket Notation</label>
        <input type="text" id="json-path-display" readonly placeholder="Click a node to see path...">
      </div>
      <div id="jsoneditor-wrapper" style="flex:1;"></div>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">Ready</span>
    <span id="copy-path-btn" class="hidden">📋 Copy Path</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/10.0.1/jsoneditor.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
